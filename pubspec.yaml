name: dg_app_partner
description: DevGruha Partner App - Manage your properties and clients.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.6

  # Auth
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^13.2.4

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  pinput: ^3.0.1

  # Utils
  intl_phone_number_input: ^0.7.4
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/launcher_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A2472"
  adaptive_icon_foreground: "assets/icons/launcher_icon.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
